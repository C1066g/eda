<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信网络技术 · 上机模考</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F3F0EB;--surface:#FFFFFF;--surface2:#F8F6F2;
  --text:#2D2B28;--text2:#7A7670;--text3:#B0ACA5;
  --accent:#5B6FEF;--green:#3DA06C;--red:#D9505C;--amber:#D4920A;
  --border:#E0DBD3;--radius:12px;--ease:cubic-bezier(0.22,0.61,0.36,1);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding:24px 20px;
}
.app{max-width:800px;margin:0 auto}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:10;background:rgba(243,240,235,0.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 0;margin-bottom:20px;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--text)}
.topbar .score{font-size:0.95rem;font-weight:700;color:var(--accent)}
.topbar .score.hidden{display:none}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fbtn{
  padding:5px 12px;border-radius:18px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:0.72rem;
  cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;white-space:nowrap;
}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Action bar */
.abar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.act{
  padding:8px 18px;border-radius:20px;font-size:0.8rem;font-weight:600;
  cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;border:none;
}
.act-submit{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(91,111,239,0.2)}
.act-submit:hover{box-shadow:0 4px 20px rgba(91,111,239,0.3);transform:translateY(-1px)}
.act-reset,.act-shuffle{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.act-reset:hover,.act-shuffle:hover{border-color:var(--accent);color:var(--accent)}

/* Stats bar */
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;font-size:0.75rem;color:var(--text2)}
.stats span{display:flex;align-items:center;gap:5px}
.stats .dot{width:8px;height:8px;border-radius:50%}
.dot-correct{background:var(--green)}.dot-wrong{background:var(--red)}.dot-pending{background:var(--text3)}

/* Question card */
.qcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px;margin-bottom:12px;
  transition:border-color 0.3s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,0.03);
}
.qcard.wrong{border-color:rgba(217,80,92,0.3);background:#FFF5F5}
.qcard.correct{border-color:rgba(61,160,108,0.3);background:#F5FFFA}
.qhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.qnum{font-size:0.78rem;font-weight:600;color:var(--accent);white-space:nowrap}
.qtype{font-size:0.68rem;color:var(--text3);padding:2px 8px;border-radius:8px;background:var(--surface2)}
.qtext{font-size:0.9rem;line-height:1.6;margin-bottom:14px;color:var(--text);white-space:pre-wrap}
.qopts{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:10px;padding:9px 14px;
  border-radius:10px;border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s var(--ease);font-size:0.85rem;line-height:1.45;
}
.opt:hover{border-color:var(--accent);background:rgba(91,111,239,0.04)}
.opt.selected{border-color:var(--accent);background:rgba(91,111,239,0.06)}
.opt.correct-answer{border-color:var(--green);background:rgba(61,160,108,0.08)}
.opt.wrong-answer{border-color:var(--red);background:rgba(217,80,92,0.06)}
.opt-radio,.opt-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s var(--ease)}
.opt-check{border-radius:4px}
.opt.selected .opt-radio,.opt.selected .opt-check{border-color:var(--accent);background:var(--accent)}
.opt.selected .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
.opt.selected .opt-check::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:700}
.qfill{margin-top:8px}
.qfill input{
  width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:0.85rem;font-family:inherit;
  transition:border-color 0.2s var(--ease);outline:none;
}
.qfill input:focus{border-color:var(--accent)}
.qfill input.correct-input{border-color:var(--green);background:rgba(61,160,108,0.06)}
.qfill input.wrong-input{border-color:var(--red);background:rgba(217,80,92,0.06)}
.result{
  margin-top:12px;padding:10px 14px;border-radius:10px;font-size:0.8rem;line-height:1.5;
  display:none;background:rgba(61,160,108,0.06);color:var(--green);
}
.result.wrong{background:rgba(217,80,92,0.06);color:var(--red);display:block}
.result.correct{display:block}
.result .ans-label{font-size:0.7rem;opacity:0.7}
.qimg{max-width:100%;margin:8px 0;border-radius:8px}

/* Responsive */
.nav-home{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text2);text-decoration:none;margin-bottom:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface)}
.nav-home:hover{color:var(--accent);border-color:var(--accent)}
@media(max-width:600px){
  body{padding:10px}
  .qcard{padding:14px 16px}
  .qtext{font-size:0.84rem}
  .opt{font-size:0.8rem;padding:7px 10px}
  .topbar h1{font-size:0.95rem}
}
</style>
</head>
<body>
<div class="app">
  <a class="nav-home" href="通信网络技术_考试中心.html">← 考试中心</a>
  <div class="topbar">
    <div class="topbar-inner">
      <h1>通信网络技术 · 上机模考</h1>
      <span class="score hidden" id="scoreBar"></span>
    </div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="abar">
    <button class="act act-submit" onclick="submitAll()">📝 提交批改</button>
    <button class="act act-shuffle" onclick="shuffleAll()">🔀 随机排序</button>
    <button class="act act-reset" onclick="resetAll()">↺ 全部重做</button>
  </div>
  <div class="stats" id="stats"><span><span class="dot dot-pending"></span>共 <b id="statTotal">0</b> 题</span></div>
  <div id="questions"></div>
</div>

<script>
// ====== Question Data ======
const Q=[];
function A(type,text,opts,ans,tip,ch,pts){
  Q.push({type,text,opts,ans,tip,ch,pts:pts||'',userAns:null});
}
// type: single=单选 multi=多选 fill=填空 tf=判断

// ====== Chapter 1 ======
A("single","长度10^8bit数据块，带宽1Mbps信道连续发送，发送时延为？光纤传到1000km(2×10^8m/s)，传播时延为？",
  ["发送时延=10s，传播时延=5ms","发送时延=100s，传播时延=5ms","发送时延=100s，传播时延=50ms","发送时延=10s，传播时延=0.5ms"],1,"T发=10^8/10^6=100s; T传=10^6/(2×10^8)=5ms","ch1","10分");
A("single","点对点链路50km(2×10^8m/s)，带宽应为多少使传播时延和发送100B分组的发送时延一样？",
  ["1.6Mbps","3.2Mbps","6.4Mbps","32Mbps"],1,"Tp=5×10^4/2×10^8=2.5×10^-4s; B=800/2.5×10^-4=3.2Mbps","ch1","10分");
A("single","512B分组时带宽应为多少？",
  ["3.2Mbps","8.192Mbps","16.384Mbps","32.768Mbps"],2,"B=4096/2.5×10^-4=16.384Mbps","ch1","");
A("single","收发距离1000km(2×10^8m/s)，数据10^7bit速率100kbps，发送时延和传播时延？",
  ["发送100s，传播5ms","发送10s，传播5ms","发送100s，传播50ms","发送10s，传播0.5ms"],0,"T发=10^7/10^5=100s; T传=10^6/(2×10^8)=5ms","ch1","10分");
A("single","数据10^3bit速率1Gbps时？",
  ["发送1ms，传播5ms","发送1μs，传播5ms","发送1μs，传播0.5ms","发送10μs，传播5ms"],1,"发送=10^3/10^9=1μs","ch1","");
A("single","在下列有关网络分层的原则中，正确的是( )",
  ["同一功能可以由多个层共同实现","层数越多越好","层间接口必须清晰，跨越接口的信息量尽可能多","每层的功能应明确"],3,"A功能不应重复；B层数适量；C信息量应少","ch1","5分");
A("single","当数据分组从网络高层移动到底层时，其首部会被逐层___。",
  ["修改","加上","去除","重新安排"],1,"自上而下逐层封装加首部","ch1","5分");
A("single","1Byte等于多少个bit?",
  ["8","2","1024","1000"],0,"","ch1","5分");
A("single","以下不属于计算机网络分层结构优点的是？",
  ["各层之间是没有任何关系的","能够促进标准化工作","易于实现和维护","灵活性好"],0,"层之间有明确的接口关系","ch1","5分");
A("single","速率单位k、M、G、T的数值为( )",
  ["2^3, 2^6, 2^9, 2^12","10^3, 10^6, 10^9, 10^12","2^10, 2^20, 2^30, 2^40","10^10, 10^20, 10^30, 10^40"],1,"⚠️ 速率用10^3，数据量用2^10","ch1","5分");
A("single","数据量单位k、M、G、T的数值为( )",
  ["2^3, 2^6, 2^9, 2^12","10^10, 10^20, 10^30, 10^40","2^10, 2^20, 2^30, 2^40","10^3, 10^6, 10^9, 10^12"],2,"1KB=1024B=2^10B","ch1","5分");
A("single","在OSI参考模型中，自上而下第一个提供端到端服务的是()",
  ["传输层","会话层","应用层","数据链路层"],0,"物理+链路=点到点；传输层以上=端到端","ch1","5分");
A("single","链路100Mbps，A网卡1Gbps，B网卡10Mbps，A给B发送最高理论速率？",
  ["10Mbps","100Mbps","1Mbps","1Gbps"],0,"木桶效应：min(发送,链路,接收)=10Mbps","ch1","5分");
A("single","1MB等于多少Byte?",
  ["1000","1024","1000000","1048576(=2^20)"],3,"1M=2^20=1048576","ch1","5分");
A("single","计算机网络分为广域网、城域网和局域网，划分的主要依据是( )",
  ["网络的拓扑结构","网络的通信方式","网络的传输介质","网络的作用范围"],3,"","ch1","5分");
A("tf","在OSI体系结构中，第N层向第N+1层提供服务和协议。",
  ["对","错"],1,"只提供服务，不是协议。协议是层内对等实体间的规则","ch1","5分");
A("tf","网络利用率越高越好。",
  ["对","错"],1,"利用率高→排队时延急剧增加","ch1","5分");
A("tf","同步卫星链路的RTT比较小，这是因为其带宽比较大。",
  ["对","错"],1,"RTT大是因为距离远(36000km×2)，传播时延主导","ch1","5分");
A("fill","TCP/IP体系结构自下而上的第二层是____。",
  [],[],"网络层","网际层或网络层均可","ch1","5分");

// ====== Chapter 2 ======
A("single","下列选项中，不属于物理层接口规范定义范畴的是( )",
  ["物理地址","引脚功能","信号电平","接口形状"],0,"物理地址(MAC)是数据链路层的概念","ch2","5.8分");
A("single","对讲机的通信方式属于( )",
  ["双向同时通信(全双工)","双向交替通信(半双工)","单向通信(单工)","并行通信"],1,"⚠️ 对讲机按着说松开听，不能同时","ch2","5.8分");
A("single","在OSI参考模型中，物理层的功能是( )",
  ["在物理实体间传送数据帧","透明地传输原始比特流","建立和释放连接","发送和接受用户数据"],1,"A是链路层(传帧)","ch2","5.8分");
A("single","下列有关曼彻斯特编码的叙述，正确的是( )",
  ["每个信号起始边界作为时钟信号","每位的中间不跳变表示信号的取值为0","这种模拟信号的编码机制特别适用于传输声音","将时钟与数据取值都包含在信号中"],3,"每个码元中间都有跳变，既做时钟又传数据","ch2","5.9分");
A("single","当描述一个物理层接口引脚在处于高电平时的含义时，该描述属于( )",
  ["电气特性","规程特性","机械特性","功能特性"],3,"电气=电压范围；功能=电平含义","ch2","5.9分");
A("single","影响信道最大传输速率的因素主要有( )",
  ["码元传输速率和噪声功率","发送功率和噪声功率","频率特性和带宽","信道带宽和信噪比"],3,"香农公式：C=W·log₂(1+S/N)","ch2","5.9分");
A("single","在下列传输介质中，哪种传输介质的抗电磁干扰性最好？",
  ["无线介质","双绞线","同轴电缆","光缆"],3,"光纤用光信号，不受电磁干扰","ch2","5.9分");
A("single","一段差分曼彻斯特编码信号波形，其编码的二进制位串是( )",
  ["1011 0110","1011 1001","1101 0001","0010 1110"],1,"差分：位开始有跳变=0，无跳变=1","ch2","5.9分");
A("single","在物理层接口特性中，用于描述完成每种功能的事件发生顺序的是( )",
  ["机械特性","电气特性","过程特性(规程特性)","功能特性"],2,"4种特性：机械、电气、功能、过程","ch2","5.9分");
A("single","数字基带信号通过( )后可在模拟信道进行传输。",
  ["解调","滤波","调制","编码"],2,"调制=数字→模拟","ch2","5.9分");
A("single","允许数据信号有条件的双向传输但不能同时双向传输的通信方式是()",
  ["全双工","以上均不是","单工","半双工"],3,"半双工=双向交替","ch2","5.9分");
A("single","双绞线是用两根绝缘导线绞合而成的，绞合的主要目的是( )",
  ["提高信号传播速率","增大传输距离","增大抗拉强度","减少干扰"],3,"两根线的电磁干扰相互抵消","ch2","5.9分");
A("single","若链路的频率带宽为4kHz，信噪比为30dB，则该链路的理论最大数据传输速率是( )",
  ["120kbps","40kbps","160kbps","80kbps"],1,"30dB→S/N=1000; C=4000×log₂(1001)≈40k","ch2","5.9分");
A("single","现在采用32相调制技术，已知波特率B=1200，请问比特率S(b/s)是多少？",
  ["2400","3600","6000","4800"],2,"S=B×log₂32=1200×5=6000","ch2","5.9分");
A("single","某网络在物理层规定，信号的电平用+10V~+15V表示二进制0，用-10V~-15V表示二进制1，电线长度限于15m以内，这体现了物理层接口的( )",
  ["机械特性","规程特性","电气特性","功能特性"],2,"规定电压范围→电气特性","ch2","5.9分");
A("single","在光纤网中采用的多路复用技术是( )",
  ["码分复用","频分复用","波分复用","时分复用"],2,"光纤用波长划分信道=WDM","ch2","5.9分");
A("single","在电缆中采用屏蔽技术带来的好处主要是( )",
  ["减少信号衰减","减少电磁干扰辐射","减少物理损毁","减少电缆的阻抗"],1,"屏蔽层阻隔外部电磁干扰","ch2","5.9分");

// ====== Chapter 3 ======
A("single","若采用CRC校验，生成多项式为G(x)=11011(即x⁴+x³+x+1)，则在进行模2除法时，除数为( )",
  ["0010","11011","00100","1101"],1,"生成多项式系数即为除数","ch3","2.5分");
A("single","下列属于奇偶校验码特征的是( )",
  ["只能检查出偶数个比特出现误码","只能检查出奇数个比特出现误码","能检查出任意数量个比特出现误码","漏检率比CRC低"],1,"奇数误码→1数量奇偶改变→检出。CRC漏检率更低","ch3","2.5分");
A("single","假设交换机的转发表是空的，当交换机收到某个单播帧后，会将该帧( )",
  ["从接收该帧的端口再转发","泛洪(广播到除入口外的其他端口)","从另外的某个端口转发","丢弃"],1,"表空→不知道目的在哪→泛洪学习","ch3","2.5分");
A("single","转发表空，主机B给C发数据帧(入口为端口1)，C收到后向B发确认帧，交换机对这两帧的转发端口分别是？",
  ["{3}和{2}","{3}和{1,2}","{1,3}和{1,2}","{1,3}和{2}"],3,"B→C泛洪{1,3}；C→B已学到→定向{2}","ch3","2.5分");
A("single","要发送的数据为101110。采用CRC的生成多项式为G(X)=X³+1。则应添在数据后面的余数是( )",
  ["111","1001","011","11"],2,"除数=1001, 101110000模2除→余011","ch3","2.5分");
A("single","下列属于数据链路层的互连设备是( )",
  ["路由器","网桥和交换机","集线器","网关"],1,"路由器=网络层；集线器=物理层","ch3","2.5分");
A("single","在计算机网络中，所有的计算机均连接到一条通信传输线路上，在线路两端连有防止信号反射的装置，这种连接结构被称为()",
  ["环型结构","星型结构","总线结构","网状结构"],2,"总线结构：共享线路+两端终结器","ch3","2.5分");
A("single","各主机的MAC地址和网桥的转发表已标注在了图中。假设主机A给C发送一个以太网帧，则该帧能够到达主机的数量为( )",
  ["5","4","2","1"],0,"","ch3","2.5分");
A("single","对于由以太网交换机连接的100Mb/s的交换式以太网，若共有10个用户，则每个用户能够占有的带宽为( )",
  ["10Mb/s","1000Mb/s","1Mb/s","100Mb/s"],3,"交换机每个端口独占带宽","ch3","2.5分");
A("single","若有5台计算机连接到一台10Mb/s的集线器上，则每台计算机分得的平均带宽为( )",
  ["10Mb/s","5Mb/s","50Mb/s","2Mb/s"],3,"集线器共享：10/5=2Mb/s。交换机vs集线器关键区别","ch3","2.5分");
A("single","以下关于VLAN的描述中，错误的是( )",

// ====== App Logic ======
const chs={all:"全部",ch1:"第1章·概论",ch2:"第2章·物理层",ch3:"第3章·链路层",ch4:"第4章·网络层",ch5:"第5章·运输层",ch6:"第6章·应用层"};
let curCh="all",submitted=false,order=Q.map((_,i)=>i);

function renderFilters(){
  document.getElementById("filters").innerHTML=Object.entries(chs).map(([k,v])=>
    `<button class="fbtn${curCh===k?" active":""}" onclick="filterCh('${k}')">${v}</button>`
  ).join("");
}

function filterCh(ch){
  curCh=ch;submitted=false;
  document.getElementById("scoreBar").classList.add("hidden");
  renderFilters();renderAll();
}

function renderAll(){
  const container=document.getElementById("questions");
  let html='',count=0;
  for(let i=0;i<order.length;i++){
    const q=Q[order[i]];
    if(curCh!=="all"&&q.ch!==curCh)continue;
    count++;
    const isWrong=submitted&&q.userAns!==null&&!checkAns(q);
    const isCorrect=submitted&&q.userAns!==null&&checkAns(q);
    html+=`<div class="qcard${isWrong?' wrong':''}${isCorrect?' correct':''}" id="q${order[i]}">
      <div class="qhead"><span class="qnum">第${count}题</span><span class="qtype">${typeLabel(q.type)} · ${q.ch} · ${q.pts}</span></div>
      <div class="qtext">${q.text}</div>`;
    if(q.type==="single"||q.type==="tf"){
      html+=`<div class="qopts">`;
      q.opts.forEach((o,j)=>{html+=renderOpt(q,order[i],j,o,'radio');});
      html+=`</div>`;
    }else if(q.type==="fill"){
      const val=q.userAns||'';
      html+=`<div class="qfill"><input type="text" id="f${order[i]}" value="${escHtml(val)}" placeholder="输入答案..."
        onchange="setFill(${order[i]},this.value)"${submitted?' disabled':''}
        class="${submitted&&q.userAns!==null?(checkAns(q)?'correct-input':'wrong-input'):''}"></div>`;
    }else if(q.type==="essay"){
      const val=q.userAns||'';
      html+=`<div class="qfill"><textarea id="f${order[i]}" placeholder="输入答案...（提交后与关键词匹配判分）"
        oninput="setFill(${order[i]},this.value)"${submitted?' disabled':''}
        style="width:100%;min-height:100px;resize:vertical;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text);font-size:0.85rem;font-family:inherit;outline:none;"
        class="${submitted&&q.userAns!==null?(checkAns(q)?'correct-input':'wrong-input'):''}">${escHtml(val)}</textarea></div>`;
    }
    if(submitted&&q.userAns!==null){
      const ok=checkAns(q);
      html+=`<div class="result ${ok?'correct':'wrong'}">
        <span class="ans-label">${ok?'✅ 正确':'❌ 错误'}</span>
        ${!ok?`<br>正确答案：<b>${Array.isArray(q.ans)?q.ans.join(', '):q.ans}</b>`:''}
        ${q.tip?`<br><span class="ans-label">${q.tip}</span>`:''}
      </div>`;
    }
    html+=`</div>`;
  }
  container.innerHTML=html;
  document.getElementById("statTotal").textContent=count;
  if(submitted)updateScore();
}

function renderOpt(q,qi,j,o,type){
  const sel=q.userAns!==null&&(Array.isArray(q.userAns)?q.userAns.includes(j):q.userAns===j);
  let cls='opt';
  if(sel)cls+=' selected';
  if(submitted&&sel){
    cls+=checkAns(q)?' correct-answer':' wrong-answer';
  }
  if(submitted&&!sel&&(Array.isArray(q.ans)?q.ans.includes(j):q.ans===j))cls+=' correct-answer';
  return `<div class="${cls}" onclick="${submitted?'':`setSingle(${qi},${j})`}">
    <span class="${type==='radio'?'opt-radio':'opt-check'}"></span>${o}
  </div>`;
}

function setSingle(qi,j){Q[qi].userAns=j;renderAll();}
function setFill(qi,v){Q[qi].userAns=v;renderAll();}

function checkAns(q){
  if(q.userAns===null)return false;
  if(q.type==="fill"||q.type==="essay"){
    const u=q.userAns.trim().toLowerCase().replace(/\s+/g,'');
    const a=Array.isArray(q.ans)?q.ans:q.ans.split('|');
    return a.some(x=>u.includes(x.toLowerCase().replace(/\s+/g,'')));
  }
  if(Array.isArray(q.ans))return Array.isArray(q.userAns)&&q.ans.every(a=>q.userAns.includes(a))&&q.userAns.every(u=>q.ans.includes(u));
  return q.userAns===q.ans;
}

function submitAll(){
  // Auto-submit unanswered as null (wrong)
  submitted=true;
  document.getElementById("scoreBar").classList.remove("hidden");
  renderAll();
  updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateScore(){
  let correct=0,total=0;
  for(let i=0;i<order.length;i++){
    const q=Q[order[i]];
    if(curCh!=="all"&&q.ch!==curCh)continue;
    total++;
    if(q.userAns!==null&&checkAns(q))correct++;
  }
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById("scoreBar").textContent=`得分: ${correct}/${total} (${pct}%)`;
  document.getElementById("stats").innerHTML=`
    <span><span class="dot dot-correct"></span>正确 <b>${correct}</b></span>
    <span><span class="dot dot-wrong"></span>错误 <b>${total-correct-(Q.filter(q=>(curCh==='all'||q.ch===curCh)&&q.userAns===null).length)}</b></span>
    <span><span class="dot dot-pending"></span>未答 <b>${Q.filter(q=>(curCh==='all'||q.ch===curCh)&&q.userAns===null).length}</b></span>
    <span>共 <b>${total}</b> 题</span>`;
}

function resetAll(){
  Q.forEach(q=>q.userAns=null);
  submitted=false;
  document.getElementById("scoreBar").classList.add("hidden");
  renderAll();
}

function shuffleAll(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  Q.forEach(q=>q.userAns=null);
  submitted=false;
  document.getElementById("scoreBar").classList.add("hidden");
  renderAll();
}

function typeLabel(t){return{single:"单选题",tf:"判断题",fill:"填空题",essay:"主观题"}[t]||t;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Init
renderFilters();renderAll();
</script>
