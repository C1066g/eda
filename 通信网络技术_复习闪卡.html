<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信网络技术 · 章节复习闪卡</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b12;--surface:#131620;--text:#e2e4ed;--text2:#797e96;--text3:#555a70;
  --accent:#7b93f5;--accent-soft:rgba(123,147,245,0.08);--accent-glow:rgba(123,147,245,0.15);
  --green:#6ee7a5;--amber:#f5c842;--rose:#f07b8a;--purple:#b59cf5;--orange:#f5a862;
  --radius:18px;--ease:cubic-bezier(0.22,0.61,0.36,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;
  padding:24px;user-select:none;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 800px 600px at 30% -20%,rgba(123,147,245,0.04),transparent),
             radial-gradient(ellipse 600px 500px at 80% 120%,rgba(110,231,165,0.03),transparent),
             radial-gradient(ellipse 500px 400px at 50% 50%,rgba(245,200,66,0.02),transparent);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.025) 0.5px,transparent 0.5px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}
.app{width:100%;max-width:680px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:1}
.header{text-align:center}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,#c8d2f8,#a0b0f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:0.75rem;color:var(--text2);margin-top:2px}
.categories{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.cat-btn{padding:6px 13px;border-radius:22px;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02);color:var(--text2);font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.3s var(--ease);white-space:nowrap;font-family:inherit;letter-spacing:0.01em;backdrop-filter:blur(4px)}
.cat-btn:hover{border-color:rgba(255,255,255,0.12);color:var(--text);background:rgba(255,255,255,0.04);transform:translateY(-1px)}
.cat-btn.active{background:var(--accent-soft);color:var(--accent);border-color:rgba(123,147,245,0.25);box-shadow:0 0 16px var(--accent-glow)}
.subtabs{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.subtab-btn{padding:4px 13px;border-radius:14px;border:none;background:transparent;color:var(--text3);font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.22s var(--ease);font-family:inherit}
.subtab-btn:hover{color:var(--text2)}
.subtab-btn.active{background:rgba(255,255,255,0.05);color:var(--accent)}
.progress-bar-wrap{display:flex;align-items:center;gap:14px}
.progress-bar{flex:1;height:3px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a5b8f7);border-radius:3px;transition:width 0.4s var(--ease);box-shadow:0 0 8px var(--accent-glow)}
.progress-text{font-size:0.73rem;color:var(--text3);min-width:58px;text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
.card-container{perspective:1200px;min-height:380px;cursor:pointer;touch-action:manipulation}
.card-container:hover .card:not(.flipped){transform:translateY(-2px)}
.card-container:active .card:not(.flipped){transform:translateY(0) scale(0.985)}
.card{width:100%;height:100%;position:relative;transition:transform 0.55s var(--spring);transform-style:preserve-3d}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(160deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 32px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.2),0 4px 24px rgba(0,0,0,0.15);overflow-y:auto}
.card-face::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);opacity:0.5}
.card-back{transform:rotateY(180deg);background:linear-gradient(160deg,rgba(110,231,165,0.04),rgba(110,231,165,0.01));border-color:rgba(110,231,165,0.08)}
.card-tag{position:absolute;top:18px;left:24px;font-size:0.66rem;color:var(--accent);letter-spacing:0.1em;font-weight:600;opacity:0.75}
.card-index{position:absolute;top:18px;right:24px;font-size:0.7rem;color:var(--text3);font-variant-numeric:tabular-nums;font-weight:500}
.card-en{font-size:1.1rem;font-weight:550;text-align:center;line-height:1.55;letter-spacing:-0.01em;word-break:break-word;color:#dde0ef;padding:0 4px;max-width:100%}
.card-zh{font-size:1.3rem;font-weight:700;text-align:center;color:var(--green);margin-bottom:6px;padding:0 8px}
.card-tip{font-size:0.78rem;color:var(--text3);text-align:center;line-height:1.5;margin-top:6px;max-width:92%}
.card-badge{display:inline-block;padding:3px 11px;border-radius:10px;font-size:0.67rem;font-weight:600;margin-top:10px;letter-spacing:0.03em}
.badge-dx{background:var(--accent-soft);color:var(--accent)}
.badge-dd{background:rgba(240,123,138,0.08);color:var(--rose)}
.badge-tk{background:rgba(245,200,66,0.08);color:var(--amber)}
.badge-pd{background:rgba(110,231,165,0.08);color:var(--green)}
.badge-js{background:rgba(181,156,245,0.08);color:var(--purple)}
.badge-ls{background:rgba(245,168,98,0.08);color:var(--orange)}
.badge-yl{background:rgba(94,196,209,0.08);color:#5ec4d1}
.card-hint{position:absolute;bottom:16px;font-size:0.64rem;color:var(--text3);opacity:0.35;letter-spacing:0.02em}
.points{position:absolute;top:18px;right:70px;font-size:0.66rem;color:var(--amber);font-weight:600;opacity:0.8}
.nav{display:flex;align-items:center;justify-content:center;gap:12px}
.nav-btn{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text2);font-size:1.05rem;cursor:pointer;transition:all 0.25s var(--ease);display:flex;align-items:center;justify-content:center;font-family:inherit;backdrop-filter:blur(4px)}
.nav-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(123,147,245,0.3);color:var(--text);box-shadow:0 0 20px var(--accent-glow)}
.nav-btn:active{transform:scale(0.93)}
.nav-primary{padding:10px 30px;border-radius:24px;border:1px solid rgba(123,147,245,0.15);background:linear-gradient(135deg,rgba(123,147,245,0.2),rgba(123,147,245,0.08));color:#c5cff7;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.3s var(--ease);font-family:inherit;letter-spacing:0.02em;backdrop-filter:blur(4px);box-shadow:0 0 20px rgba(123,147,245,0.06)}
.nav-primary:hover{background:linear-gradient(135deg,rgba(123,147,245,0.3),rgba(123,147,245,0.12));color:#fff;box-shadow:0 0 30px var(--accent-glow);transform:translateY(-1px)}
.nav-primary:active{transform:scale(0.96)}
.actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.action-btn{padding:7px 17px;border-radius:20px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);color:var(--text2);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.25s var(--ease);font-family:inherit;backdrop-filter:blur(4px)}
.action-btn:hover{border-color:rgba(255,255,255,0.12);color:var(--text);background:rgba(255,255,255,0.04)}
.action-btn.marked{background:rgba(245,200,66,0.12);color:var(--amber);border-color:rgba(245,200,66,0.2)}
.kbd-hints{text-align:center;font-size:0.66rem;color:var(--text3);opacity:0.5;display:flex;gap:18px;justify-content:center;flex-wrap:wrap;letter-spacing:0.02em}
.kbd-hints kbd{display:inline-block;padding:2px 7px;border-radius:5px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);font-family:inherit;font-size:0.64rem;font-weight:500}
@keyframes cardIn{from{opacity:0}to{opacity:1}}
.card-en,.card-zh{animation:cardIn 0.35s var(--ease)}
.nav-home{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text2);text-decoration:none;margin-bottom:8px;padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.nav-home:hover{color:var(--accent);border-color:rgba(123,147,245,0.3)}
@media(max-width:480px){
  body{padding:14px}
  .card-container{min-height:320px}
  .card-en{font-size:0.95rem!important}
  .card-zh{font-size:1.1rem}
  .card-face{padding:20px}
  .app{gap:12px}
  .cat-btn{padding:5px 10px;font-size:0.67rem}
  .nav-btn{width:40px;height:40px}
  .nav-primary{padding:8px 22px;font-size:0.82rem}
}
</style>
</head>
<body>
<div class="app">
  <a class="nav-home" href="通信网络技术_考试中心.html">← 考试中心</a>
  <div class="header">
    <h1>通信网络技术 · 章节复习</h1>
    <p>第1-6章作业 · 共146题</p>
  </div>
  <div class="categories" id="categories"></div>
  <div class="subtabs" id="subtabs"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText">0/0</span>
  </div>
  <div class="card-container" id="cardContainer" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="card-tag" id="cardTag"></span>
        <span class="points" id="cardPoints"></span>
        <span class="card-index" id="cardIndex"></span>
        <div class="card-en" id="cardEn"></div>
        <span class="card-hint">点击 / 空格 查看答案</span>
      </div>
      <div class="card-face card-back">
        <div class="card-zh" id="cardZh"></div>
        <div class="card-tip" id="cardTip"></div>
        <span class="card-badge" id="cardBadge"></span>
        <span class="card-hint">点击 / 空格 返回题目</span>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" onclick="prevCard()">◀</button>
    <button class="nav-primary" onclick="shuffleCards()">🔀 随机</button>
    <button class="nav-btn" onclick="nextCard()">▶</button>
  </div>
  <div class="actions">
    <button class="action-btn" id="btnMark" onclick="toggleMark()">☆ 收藏</button>
    <button class="action-btn" id="btnShowMarked" onclick="showOnlyMarked()">📌 仅看收藏</button>
    <button class="action-btn" onclick="resetProgress()">↺ 重置</button>
  </div>
  <div class="kbd-hints">
    <span><kbd>←</kbd><kbd>→</kbd>翻页</span>
    <span><kbd>Space</kbd>翻转</span>
    <span><kbd>S</kbd>收藏</span>
    <span><kbd>R</kbd>随机</span>
  </div>
</div>
<script>
const V=[];
function A(en,zh,tip,cat,sub,type,pts){V.push({en,zh,tip,cat,sub,type,pts:pts||''});}

// ====== Chapter 1 ======
A("长度10^8bit数据块，带宽1Mbps，发送时延？光纤1000km(2×10^8m/s)，传播时延？","发送时延=100s，传播时延=5ms","计算公式：T发=L/R, T传=d/v","ch1","计算","js","10分")
A("点对点链路50km(2×10^8m/s)，带宽应为多少使传播时延和发送100B分组的发送时延一样？512B呢？","B1=3.2Mbps, B2=16.384Mbps","Tp=d/v=2.5×10^-4s, B=L/Tp","ch1","计算","js","10分")
A("传输距离1000km(2×10^8m/s)，数据10^7bit速率100kbps的发送时延和传播时延？","发送时延=100s, 传播时延=5ms","发送时延=L/R, 传播时延=d/v","ch1","计算","js","10分")
A("传输距离1000km，数据10^3bit速率1Gbps的发送时延和传播时延？","发送时延=1μs, 传播时延=5ms","速率高了发送时延大幅下降","ch1","计算","js","")
A("在下列有关网络分层的原则中，正确的是( )","D. 每层的功能应明确","A错(功能不应重复)；B错(层数适量)；C错(信息量应少)","ch1","单选","dx","5分")
A("当数据分组从网络高层移动到底层时，其首部会被逐层___","B. 加上","自上而下逐层封装、加首部；自下而上逐层解封、去首部","ch1","单选","dx","5分")
A("1Byte等于多少个bit?","A. 8","基本概念","ch1","单选","dx","5分")
A("以下不属于计算机网络分层结构优点的是？","A. 各层之间是没有任何关系的","层之间通过接口有明确关系","ch1","单选","dx","5分")
A("速率单位k、M、G、T的数值为( )","B. 10^3, 10^6, 10^9, 10^12","⚠️ 速率用10^3，数据量用2^10！","ch1","单选","dx","5分")
A("数据量单位k、M、G、T的数值为( )","C. 2^10, 2^20, 2^30, 2^40","1KB=1024B，数据量用2的幂","ch1","单选","dx","5分")
A("在OSI参考模型中，自上而下第一个提供端到端服务的是()","A. 传输层","物理层+链路层=点到点；网络层以上=端到端","ch1","单选","dx","5分")
A("链路100Mbps，主机A网卡1Gbps，主机B网卡10Mbps，A给B发送最高理论速率？","A. 10Mbps","木桶效应：min(发送速率, 链路带宽, 接收速率)","ch1","单选","dx","5分")
A("1MB等于多少Byte?","D. 2^20 = 1048576","1M=2^20, 1B=8b","ch1","单选","dx","5分")
A("计算机网络分为广域网、城域网和局域网，划分的主要依据是( )","D. 网络的作用范围","WAN>MAN>LAN，按地理范围划分","ch1","单选","dx","5分")
A("在OSI体系结构中，第N层向第N+1层提供服务和协议。","错","只提供服务，不是协议。协议是层内对等实体间的规则","ch1","判断","pd","5分")
A("网络利用率越高越好。","错","利用率高→排队时延急剧增加","ch1","判断","pd","5分")
A("同步卫星链路的RTT比较小，这是因为其带宽比较大。","错","RTT大是因为距离远(36000km×2)，传播时延主导","ch1","判断","pd","5分")
A("TCP/IP体系结构自下而上的第二层是____。","网络层 / 网际层","TCP/IP：网络接口层→网际层→运输层→应用层","ch1","填空","tk","5分")

// ====== Chapter 2 ======
A("下列选项中，不属于物理层接口规范定义范畴的是( )","A. 物理地址","物理地址(MAC)是数据链路层的概念","ch2","单选","dx","5.8分")
A("对讲机的通信方式属于( )","B. 双向交替通信(半双工)","⚠️ 对讲机：按着说，松开听，不能同时","ch2","单选","dx","5.8分")
A("在OSI参考模型中，物理层的功能是( )","B. 透明地传输原始比特流","A是链路层(传帧)，C/D不是物理层职责","ch2","单选","dx","5.8分")
A("下列有关曼彻斯特编码的叙述，正确的是( )","D. 将时钟与数据取值都包含在信号中","每个码元中间都有跳变，既做时钟又传数据","ch2","单选","dx","5.9分")
A("描述一个物理层接口引脚在处于高电平时的含义，该描述属于( )","D. 功能特性","电气=电压范围；功能=电平含义；规程=事件顺序；机械=形状尺寸","ch2","单选","dx","5.9分")
A("影响信道最大传输速率的因素主要有( )","D. 信道带宽和信噪比","香农公式：C=W·log₂(1+S/N)","ch2","单选","dx","5.9分")
A("在下列传输介质中，哪种传输介质的抗电磁干扰性最好？","D. 光缆","光纤用光信号，不受电磁干扰","ch2","单选","dx","5.9分")
A("一段差分曼彻斯特编码信号波形，其二进制位串是？","B. 1011 1001","差分曼彻斯特：位开始有跳变=0，无跳变=1","ch2","单选","dx","5.9分")
A("在物理层接口特性中，用于描述完成每种功能的事件发生顺序的是( )","C. 过程特性(规程特性)","4种特性：机械、电气、功能、过程","ch2","单选","dx","5.9分")
A("数字基带信号通过( )后可在模拟信道进行传输。","C. 调制","调制=数字→模拟；解调=模拟→数字","ch2","单选","dx","5.9分")
A("允许数据信号有条件的双向传输但不能同时双向传输的通信方式是？","D. 半双工","单工=单向；半双工=双向交替；全双工=双向同时","ch2","单选","dx","5.9分")
A("双绞线是用两根绝缘导线绞合而成的，绞合的主要目的是( )","D. 减少干扰","两根线产生的电磁干扰相互抵消","ch2","单选","dx","5.9分")
A("若链路带宽4kHz，信噪比30dB，理论最大传输速率是？","B. 40kbps","30dB→S/N=1000. C=4000×log₂(1+1000)≈4000×10=40k","ch2","单选","dx","5.9分")
A("32相调制技术，波特率1200，比特率是多少？","C. 6000 b/s","S=B·log₂V=1200×log₂32=1200×5=6000","ch2","单选","dx","5.9分")
A("信号电平+10~+15V表0，-10~-15V表1，电线长度≤15m，体现物理层接口的( )","C. 电气特性","规定电压范围→电气特性","ch2","单选","dx","5.9分")
A("在光纤网中采用的多路复用技术是( )","C. 波分复用(WDM)","光纤用波长划分信道","ch2","单选","dx","5.9分")
A("在电缆中采用屏蔽技术带来的好处主要是( )","B. 减少电磁干扰辐射","屏蔽层阻隔外部电磁干扰","ch2","单选","dx","5.9分")

// ====== Chapter 3 ======
A("若采用CRC校验，生成多项式为G(x)=x⁴+x³+x+1(即11011)，除数为？","B. 11011","生成多项式系数即为除数","ch3","单选","dx","2.5分")
A("下列属于奇偶校验码特征的是( )","B. 只能检查出奇数个比特出现误码","奇数误码→比特1数量奇偶性改变→可检出。偶数→检不出。CRC漏检率更低","ch3","单选","dx","2.5分")
A("假设交换机转发表为空，收到某个单播帧后会( )","B. 泛洪(广播到除入口外的其他端口)","表空→不知道目的在哪→泛洪学习","ch3","单选","dx","2.5分")

// ====== State Management ======
const CATEGORIES=[
  {id:"all",label:"全部"},
  {id:"ch1",label:"📡 第1章·概论"},
  {id:"ch2",label:"⚡ 第2章·物理层"},
  {id:"ch3",label:"🔗 第3章·链路层"},
  {id:"ch4",label:"🌐 第4章·网络层"},
  {id:"ch5",label:"📦 第5章·运输层"},
  {id:"ch6",label:"💻 第6章·应用层"},
];
const SUBCATS=[
  {id:"all",label:"全部题型"},
  {id:"单选",label:"单选题"},
  {id:"填空",label:"填空题"},
  {id:"判断",label:"判断题"},
  {id:"计算",label:"计算题"},
  {id:"简答",label:"简答题"},
  {id:"论述",label:"论述题"},
  {id:"阅读",label:"阅读理解"},
];
let currentCat="all",currentSub="all",showMarked=false,currentIdx=0;
let markedCards=new Set(JSON.parse(localStorage.getItem("net-hw-marked")||"[]"));
let filteredCards=[];

function getFilteredCards(){
  let cards=showMarked?V.filter(c=>markedCards.has(c.en)):V;
  if(showMarked&&cards.length===0&&markedCards.size===0){showMarked=false;cards=V;}
  if(currentCat!=="all")cards=cards.filter(c=>c.cat===currentCat);
  if(currentSub!=="all")cards=cards.filter(c=>c.sub===currentSub);
  return cards;
}
function saveMarked(){localStorage.setItem("net-hw-marked",JSON.stringify([...markedCards]));}

function renderCard(){
  const card=document.getElementById("card");
  card.style.transition="none";card.classList.remove("flipped");card.offsetHeight;
  const animEls=document.querySelectorAll(".card-en,.card-zh");
  animEls.forEach(el=>{el.style.animation="none";el.offsetHeight;el.style.animation="";});
  if(filteredCards.length===0){
    document.getElementById("cardTag").textContent="";document.getElementById("cardPoints").textContent="";
    document.getElementById("cardIndex").textContent="";document.getElementById("cardEn").textContent="没有匹配的题目";
    document.getElementById("cardZh").textContent="";document.getElementById("cardTip").textContent="";
    document.getElementById("cardBadge").textContent="";document.getElementById("cardBadge").className="card-badge";
    card.offsetHeight;card.style.transition="";updateProgress();return;
  }
  const item=filteredCards[currentIdx];
  document.getElementById("cardTag").textContent=item.sub||"";
  document.getElementById("cardPoints").textContent=item.pts||"";
  document.getElementById("cardIndex").textContent=`${currentIdx+1}/${filteredCards.length}`;
  const enEl=document.getElementById("cardEn");
  enEl.textContent=item.en;
  const len=item.en.length;
  if(len>120)enEl.style.fontSize="0.8rem";
  else if(len>80)enEl.style.fontSize="0.88rem";
  else if(len>55)enEl.style.fontSize="0.95rem";
  else if(len>35)enEl.style.fontSize="1.05rem";
  else enEl.style.fontSize="1.15rem";

  document.getElementById("cardZh").textContent=item.zh;
  document.getElementById("cardTip").textContent=item.tip||"";
  const badge=document.getElementById("cardBadge");
  const bm={单选:"badge-dx",填空:"badge-tk",判断:"badge-pd",计算:"badge-js",简答:"badge-ls",论述:"badge-ls",阅读:"badge-yl"};
  badge.className="card-badge "+(bm[item.sub]||"badge-dx");
  const lm={单选:"单选题",填空:"填空题",判断:"判断题",计算:"计算题",简答:"简答题",论述:"论述题",阅读:"阅读理解"};
  badge.textContent=lm[item.sub]||item.sub;
  updateProgress();updateMarkBtn();
  card.offsetHeight;card.style.transition="";
}

function updateProgress(){
  const t=filteredCards.length,c=t===0?0:currentIdx+1;
  document.getElementById("progressText").textContent=`${c}/${t}`;
  document.getElementById("progressFill").style.width=t===0?"0%":`${(c/t)*100}%`;
}
function updateMarkBtn(){
  const btn=document.getElementById("btnMark");
  if(filteredCards.length===0){btn.textContent="☆ 收藏";btn.classList.remove("marked");return;}
  const m=markedCards.has(filteredCards[currentIdx].en);
  btn.textContent=m?"★ 已收藏":"☆ 收藏";btn.classList.toggle("marked",m);
}
function flipCard(){if(filteredCards.length)document.getElementById("card").classList.toggle("flipped");}
function nextCard(){if(filteredCards.length){currentIdx=(currentIdx+1)%filteredCards.length;renderCard();}}
function prevCard(){if(filteredCards.length){currentIdx=(currentIdx-1+filteredCards.length)%filteredCards.length;renderCard();}}
function shuffleCards(){if(filteredCards.length){currentIdx=Math.floor(Math.random()*filteredCards.length);renderCard();}}
function toggleMark(){
  if(!filteredCards.length)return;
  const item=filteredCards[currentIdx];
  markedCards.has(item.en)?markedCards.delete(item.en):markedCards.add(item.en);
  saveMarked();updateMarkBtn();
}
function showOnlyMarked(){
  showMarked=!showMarked;
  const btn=document.getElementById("btnShowMarked");
  btn.textContent=showMarked?"📌 查看全部":"📌 仅看收藏";
  btn.classList.toggle("marked",showMarked);
  currentIdx=0;refreshAll();
}
function resetProgress(){currentIdx=0;document.getElementById("card").classList.remove("flipped");renderCard();}

function refreshAll(){
  filteredCards=getFilteredCards();
  if(currentIdx>=filteredCards.length)currentIdx=0;
  renderCategories();renderSubtabs();renderCard();updateProgress();updateMarkBtn();
}
function renderCategories(){
  document.getElementById("categories").innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn${currentCat===c.id?" active":""}" onclick="selectCat('${c.id}')">${c.label}</button>`
  ).join("");
}
function renderSubtabs(){
  document.getElementById("subtabs").innerHTML=SUBCATS.map(s=>
    `<button class="subtab-btn${currentSub===s.id?" active":""}" onclick="selectSub('${s.id}')">${s.label}</button>`
  ).join("");
}
function selectCat(id){currentCat=id;currentSub="all";currentIdx=0;refreshAll();}
function selectSub(id){currentSub=id;currentIdx=0;refreshAll();}

// Touch swipe
let tsX=0,tsY=0;
document.getElementById("cardContainer").addEventListener("touchstart",e=>{tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;},{passive:true});
document.getElementById("cardContainer").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tsX,dy=e.changedTouches[0].clientY-tsY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){e.preventDefault();dx<0?nextCard():prevCard();}
});

// Keyboard
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
  switch(e.key){
    case"ArrowLeft":prevCard();break;case"ArrowRight":nextCard();break;
    case" ":e.preventDefault();flipCard();break;
    case"s":case"S":toggleMark();break;case"r":case"R":shuffleCards();break;
  }
});

function init(){
  renderCategories();renderSubtabs();
  filteredCards=getFilteredCards();renderCard();
}
init();
</script>
