<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信网络技术 · 分类复习</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F3F0EB;--surface:#FFFFFF;--surface2:#F8F6F2;
  --text:#2D2B28;--text2:#7A7670;--text3:#B0ACA5;
  --accent:#5B6FEF;--green:#3DA06C;--red:#D9505C;--amber:#D4920A;
  --border:#E0DBD3;--radius:12px;--ease:cubic-bezier(0.22,0.61,0.36,1);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding:24px 20px;
}
.app{max-width:860px;margin:0 auto}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:10;background:rgba(243,240,235,0.9);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);padding:14px 0;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--text)}
.topbar .score{font-size:0.95rem;font-weight:700;color:var(--accent)}

/* Main tabs */
.main-tabs{display:flex;gap:0;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.main-tab{
  flex:1;padding:10px 16px;text-align:center;cursor:pointer;transition:all 0.2s var(--ease);
  font-size:0.85rem;font-weight:600;font-family:inherit;border:none;
  background:var(--surface);color:var(--text2);
}
.main-tab:hover{color:var(--accent);background:var(--surface2)}
.main-tab.active{background:var(--accent);color:#fff}
.main-tab .emoji{font-size:1rem;margin-right:2px}

/* Filters */
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{
  padding:5px 12px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:0.7rem;
  cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;white-space:nowrap;
}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Action bar */
.abar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.act{
  padding:7px 16px;border-radius:18px;font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;border:none;
}
.act-submit{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,111,239,0.15)}
.act-submit:hover{box-shadow:0 4px 16px rgba(91,111,239,0.25)}
.act-reset{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.act-reset:hover{border-color:var(--accent);color:var(--accent)}

/* Stats */
.stats{font-size:0.73rem;color:var(--text2);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap}
.stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-c{background:var(--green)}.dot-w{background:var(--red)}.dot-p{background:var(--text3)}

/* Question card */
.qcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;
  transition:border-color 0.3s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,0.03);
}
.qcard.wrong{border-color:rgba(217,80,92,0.3);background:#FFF5F5}
.qcard.correct{border-color:rgba(61,160,108,0.3);background:#F5FFFA}
.qhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.qnum{font-size:0.73rem;font-weight:600;color:var(--accent);white-space:nowrap}
.qtext{font-size:0.88rem;line-height:1.55;color:var(--text);margin-bottom:10px}
.qopts{display:flex;flex-direction:column;gap:6px}
.opt{
  display:flex;align-items:flex-start;gap:10px;padding:8px 12px;
  border-radius:8px;border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s var(--ease);font-size:0.84rem;line-height:1.4;
}
.opt:hover{border-color:var(--accent);background:rgba(91,111,239,0.04)}
.opt.selected{border-color:var(--accent);background:rgba(91,111,239,0.06)}
.opt.correct-answer{border-color:var(--green)!important;background:rgba(61,160,108,0.08)!important}
.opt.wrong-answer{border-color:var(--red)!important;background:rgba(217,80,92,0.06)!important}
.opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.opt.selected .opt-radio{border-color:var(--accent);background:var(--accent)}
.opt.selected .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
.opt-res{font-size:0.75rem;padding:6px 10px;margin-top:6px;border-radius:8px;display:none}
.opt-res.show{display:block}
.opt-res.correct{border-left:2px solid var(--green);background:rgba(61,160,108,0.06);color:var(--green)}
.opt-res.wrong{border-left:2px solid var(--red);background:rgba(217,80,92,0.06);color:var(--red)}

/* Calc cards */
.calc-item{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);
}
.calc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.calc-num{font-size:0.8rem;font-weight:700;color:var(--accent)}
.calc-ch{font-size:0.65rem;color:var(--text3);padding:2px 8px;border-radius:6px;background:var(--surface2);white-space:nowrap}
.calc-steps{
  font-size:0.84rem;line-height:1.7;color:#4A4A6A;padding:14px 18px;border-radius:8px;
  background:rgba(91,111,239,0.04);border-left:3px solid rgba(91,111,239,0.3);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  white-space:pre-wrap;overflow-x:auto;text-align:left;
}
.calc-ans{
  font-size:0.86rem;color:var(--green);margin-top:10px;padding:10px 16px;border-radius:8px;
  background:rgba(61,160,108,0.06);border-left:3px solid rgba(61,160,108,0.25);text-align:left;
}

.nav-home{
  display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text2);
  text-decoration:none;margin-bottom:10px;padding:4px 10px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);transition:all 0.2s var(--ease);
}
.nav-home:hover{color:var(--accent);border-color:var(--accent)}

@media(max-width:600px){
  body{padding:10px}
  .qcard{padding:14px 15px}
  .qtext{font-size:0.84rem}
}

.qfill{margin-top:8px}
.qfill input{
  width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:0.84rem;font-family:inherit;outline:none;
}
.qfill input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ====== Data ======
// Q: {type:"single"|"tf"|"fill", q, opts:[], ans:index, tip, ch}
const Q=[];
const CAL=[];

// ====== 记忆题 ======
function add(q,opts,ans,tip,ch){Q.push({type:"single",q,opts,ans,tip,ch,userAns:null});}
function addTF(q,ans,tip,ch){Q.push({type:"tf",q,opts:["对","错"],ans,tip,ch,userAns:null});}

// Ch1
add("速率单位k、M、G、T的数值是？",["2^3,2^6,2^9,2^12","10^3,10^6,10^9,10^12","2^10,2^20,2^30,2^40","10^10,10^20,10^30,10^40"],1,"⚠️ 速率用10^3，数据量用2^10！","ch1");
add("数据量单位K、M、G、T的数值是？",["2^3,2^6,2^9,2^12","10^10,10^20,10^30,10^40","2^10,2^20,2^30,2^40","10^3,10^6,10^9,10^12"],2,"1KB=1024B=2^10B","ch1");
add("关于网络分层原则，正确的是？",["同一功能可由多个层实现","层数越多越好","每层的功能应明确","接口信息量尽可能多"],2,"层数适量、功能不重复、接口简单","ch1");
add("OSI参考模型中自上而下第一个提供端到端服务的是？",["传输层","会话层","应用层","数据链路层"],0,"物理+链路=点到点；网络层以上=端到端","ch1");
add("各层传输单位的对应关系？",["比特→数据报→帧→报文段","比特→帧→数据报→报文段","帧→比特→报文段→数据报","报文段→数据报→帧→比特"],1,"物理=比特→链路=帧→网络=数据报→运输=报文段","ch1");
add("链路100Mbps，A网卡1Gbps，B网卡10Mbps，A→B最高速率？",["10Mbps","100Mbps","1Mbps","1Gbps"],0,"木桶效应：min(发送,链路,接收)","ch1");
add("计算机网络按作用范围从小到大排序？",["WAN<MAN<LAN","LAN<WAN<MAN","LAN<MAN<WAN","MAN<LAN<WAN"],2,"LAN局域网<MAN城域网<WAN广域网","ch1");
addTF("第N层向第N+1层提供服务和协议。",1,"只提供服务，不是协议。协议是层内对等实体间的规则","ch1");
addTF("网络利用率越高越好。",1,"利用率高→排队时延急剧增加","ch1");
addTF("同步卫星链路的RTT比较小，因为带宽大。",1,"RTT大是因为距离远(36000km×2)，与带宽无关","ch1");
add("TCP/IP体系结构自下而上第二层是？",["应用层","运输层","网际层(网络层)","网络接口层"],2,"TCP/IP：接口层→网际层(IP)→运输层→应用层","ch1");

// Ch2
add("不属于物理层接口规范定义范畴的是？",["物理地址","引脚功能","信号电平","接口形状"],0,"物理地址(MAC)是数据链路层的","ch2");
add("物理层的主要功能是？",["提供可靠传输","透明地传输原始比特流","实现路由选择","提供端到端服务"],1,"物理层只负责比特流传输，不管内容含义","ch2");
add("对讲机的通信方式属于？",["全双工","半双工","单工","并行通信"],1,"对讲机：按着说松开听，双向但不能同时→半双工","ch2");
add("允许双向通信但不能同时进行的通信方式是？",["单工","半双工","全双工","串行通信"],1,"半双工=双向交替；全双工=双向同时","ch2");
add("描述接口各事件发生时序的物理层特性是？",["机械特性","电气特性","功能特性","规程特性(过程特性)"],3,"规程/过程特性=事件发生的先后顺序","ch2");
add("关于曼彻斯特编码正确的是？",["起始边界为时钟信号","中间不跳变表0","适用于传输声音","将时钟和数据包含在信号中"],3,"每个码元中间跳变=时钟+数据同步","ch2");
add("描述引脚高电平的含义属于物理层的？",["电气特性","规程特性","机械特性","功能特性"],3,"电气=电压范围；功能=电平含义；规程=事件顺序；机械=形状","ch2");
add("影响信道最大传输速率的主要因素？",["码元速率和噪声功率","发送功率和噪声功率","频率特性和带宽","信道带宽和信噪比"],3,"香农公式 C=W·log₂(1+S/N)","ch2");
add("哪种传输介质抗电磁干扰性最好？",["无线介质","双绞线","同轴电缆","光缆"],3,"光纤用光信号，不受电磁干扰","ch2");
add("双绞线绞合的主要目的是？",["提高传播速率","增大传输距离","增大抗拉强度","减少干扰"],3,"两根线干扰相互抵消","ch2");
add("光纤网中采用的多路复用技术是？",["码分复用","频分复用","波分复用(WDM)","时分复用"],2,"","ch2");
add("数字基带信号通过什么在模拟信道传输？",["解调","滤波","调制","编码"],2,"调制=数字→模拟；解调=模拟→数字","ch2");
add("+10~+15V表0，-10~-15V表1，线长≤15m，体现什么？",["机械特性","规程特性","电气特性","功能特性"],2,"电压范围→电气特性","ch2");
add("电缆屏蔽的好处？",["减少信号衰减","减少电磁干扰辐射","减少物理损毁","减少电缆阻抗"],1,"","ch2");
add("带宽4kHz、信噪比30dB，信道最大传输速率约为？",["20kbps","40kbps","80kbps","400kbps"],1,"C=4000×log₂(1001)≈40kbps","ch2");
add("差分曼彻斯特编码，某波形对应二进制为？",["0110 0110","1011 1001","1100 1100","1001 1011"],1,"位边界有跳变=0，无跳变=1","ch2");
add("32相调制，波特率1200，比特率？",["2400","3600","6000","4800"],2,"S=B×log₂V=1200×5=6000","ch2");

// Ch3
add("CRC生成多项式G(x)=11011，除数为？",["0010","11011","00100","1101"],1,"生成多项式系数=除数","ch3");
add("奇偶校验码的特征？",["只能检偶数个误码","只能检奇数个误码","任意数量都能检","漏检率比CRC低"],1,"奇数误码→1数量奇偶改变→可检","ch3");
add("交换机转发表空，收到单播帧后？",["从接收端口再转发","泛洪(除入口外所有端口)","从另外某个端口转发","丢弃"],1,"表空→不知道目的→泛洪学习","ch3");
add("数据链路层互连设备？",["路由器","网桥和交换机","集线器","网关"],1,"路由器=网络层；集线器=物理层","ch3");
add("总线结构的特点？",["环状连接","星型连接","共享线路+两端终结器","网状连接"],2,"","ch3");
add("交换式100Mb/s×10用户，每用户带宽？",["10Mb/s","1000Mb/s","1Mb/s","100Mb/s"],3,"交换机每端口独占带宽","ch3");
add("5台计算机连接10Mb/s集线器，每台平均带宽？",["10Mb/s","5Mb/s","50Mb/s","2Mb/s"],3,"集线器共享：10/5=2","ch3");
add("通过交换机连接的一组主机？",["同一冲突域","同一广播域但不同冲突域","同一冲突域和广播域","既非冲突域也非广播域"],1,"交换机隔离冲突域，不隔离广播域","ch3");
add("VLAN描述错误的是？",["802.1Q帧最大1518B","同VLAN可跨交换机","不同VLAN链路层隔离","VLAN是服务不是新网络"],0,"⚠️ 802.1Q加4B→最大1522B","ch3");
add("数据链路层传输单位？",["帧","比特流","报文段","数据报"],0,"链路层=帧；物理层=比特；网络层=数据报","ch3");
add("1000Base-T中1000含义？",["争用期1000μs","最大1000主机","带宽1000Mb/s","最长1000米"],2,"1000=速率；Base=基带；T=双绞线","ch3");
add("以太网退避算法第11次碰撞后随机范围？",["2047","255","1023","511"],2,"k=min(11,10)=10, 2^10-1=1023","ch3");
add("CSMA/CD最短帧长？",["32字节","64字节","128字节","1518字节"],1,"经典必记值","ch3");
add("CSMA/CD工作原理核心是哪四个步骤？",["先发后听→碰撞继续→超时丢弃","先听后发→边发边听→碰撞停发→随机重发","监听信道→立即发送→确认接收","发送→确认→重传→超时"],1,"","ch3");
add("以太网卡工作在哪两层？",["物理层+网络层","数据链路层+网络层","物理层+数据链路层","数据链路层+应用层"],2,"","ch3");
add("网桥转发表为空时A→C能到达几台主机？(多网桥拓扑)",["5台","4台","2台","1台"],0,"","ch3");
add("零比特填充法的规则？",["每5个1后插1个0","每8个1后插1个0","每5个0后插1个1","每5个1后删1个0(发送端)"],0,"面向比特链路的透明传输","ch3");
add("CRC：数据101110，G(x)=X³+1，余数是？",["111","1001","011","11"],2,"除数1001，数据+3个0模2除→余011","ch3");
add("1000Mb/s CSMA/CD，最小帧256B，单向传播延时最多？",["2.048μs","8.192μs","4.096μs","1.024μs"],3,"256×8=1000×10⁶×2τ→τ=1.024μs","ch3");
add("10km/10Mbps/200m/μs，CSMA/CD最小帧长？",["100bit","1000bit","200bit","20bit"],1,"2τ=100μs，最小帧=10×10⁶×100×10⁻⁶=1000bit","ch3");
add("交换机表空，A→B数据帧与B→A确认帧收到主机数？",["3,3","1,1","1,3","3,1"],3,"数据帧泛洪3台；确认帧定向1台","ch3");

// Ch4
add("路由器转发IP数据报依据？",["源IP+路由表","目的IP+路由表","源MAC+路由表","目的MAC+路由表"],1,"路由器查目的IP不查MAC","ch4");
add("IPv4首部中与分片无关的字段？",["标识","标志","片偏移","协议"],3,"分片相关=标识+MF/DF+片偏移","ch4");
add("协议字段=IP版本(值为4=IPv4)？",["对","错——协议=上层协议，版本字段才是IP版本"],1,"协议字段=上层(TCP=6,UDP=17)","ch4");
add("RIP距离值16的意义？",["网络不可达","存在环路","直连网络","经过16次转发"],0,"RIP最大15，16=不可达","ch4");
add("RIP：X通告到Y距离N，K选X做下一跳到Y的距离？",["N-1","N","N+1","1"],2,"收到邻居通告距离+1","ch4");
add("C类但不能分配给主机的是？",["196.2.3.8","192.0.0.255","191.255.255.252","126.255.255.255"],1,"C类主机号全1=广播地址","ch4");
add("解决IPv4耗尽，治本措施？",["采用VPN","采用NAT","采用IPv6","采用CIDR"],2,"CIDR/NAT是过渡，IPv6是根本","ch4");
add("需发送ARP请求的情况？",["需接收无映射","需接收有映射","需发送无目的IP的MAC映射","需发送有映射"],2,"⚠️发送且无映射才发ARP","ch4");
add("IP分组传输中源/目的IP变化？",["都不变","源变目的不变","源不变目的变","都变"],0,"不考虑NAT→IP全程不变，只有MAC逐段变","ch4");
add("TCP/IP网际层四个协议？",["IP,ICMP,ARP,UDP","TCP,ICMP,UDP,ARP","IP,ICMP,ARP,RARP","UDP,IP,ICMP,RARP"],2,"","ch4");
add("不属于IP层功能？",["尽力而为转发","路由选择","分片重组","进程间接口"],3,"进程间接口=运输层","ch4");
add("192.168.16.0/25均分两子网(销售+技术)，销售广播和技术网络？",["20,65","63,64","62,126","20,64"],1,"均分→/26","ch4");

CAL.push({q:"发送时延 & 传播时延", steps:
`【公式】
  T_send = L / R     (L=数据长度bit, R=发送速率bps)
  T_prop = d / v     (d=距离m, v=传播速度m/s)

【例题1】L=10^8 bit, R=1Mbps=10^6 bps, d=1000km=10^6 m, v=2×10^8 m/s
  T_send = 10^8 / 10^6 = 100s
  T_prop = 10^6 / (2×10^8) = 0.005s = 5ms
  → 发送时延主导！大文件传输时发送时延通常远大于传播时延

【例题2】L=10^3 bit, R=1Gbps=10^9 bps, 同上距离
  T_send = 10^3 / 10^9 = 1×10⁻⁶s = 1μs
  T_prop = 5ms (不变)
  → 传播时延主导！小数据高速传输时传播时延远大于发送时延

⚠️ 易错：传播时延与数据量无关，只取决于距离和传播速度！`, ans:"T_send=L/R, T_prop=d/v", ch:"ch1"});

CAL.push({q:"带宽计算（使发送=传播时延）", steps:
`【问题】点对点50km, v=2×10^8 m/s, 要使T_send = T_prop, 带宽B=?

【分步计算】
  T_prop = 50×10^3 / (2×10^8) = 250×10⁻⁶ = 250μs

  对于100B分组: L=800 bit
  T_send = L / B, 令 T_send = T_prop
  → 800 / B = 250μs → B = 800 / (250×10⁻⁶) = 3.2×10^6 = 3.2 Mbps

  对于512B分组: L=4096 bit
  → B = 4096 / (250×10⁻⁶) = 16.384×10^6 ≈ 16.4 Mbps

【理解】数据越短→所需带宽越小（发送时间更短，需更窄带宽来加长发送时间匹配传播时间）`, ans:"100B→3.2Mbps; 512B→16.4Mbps", ch:"ch1"});

CAL.push({q:"香农公式：信道极限速率", steps:
`【公式】C = W × log₂(1 + S/N)
  C=极限速率(bps), W=带宽(Hz), S/N=信噪比(无量纲比值)

【dB换算】信噪比(dB) = 10 × log₁₀(S/N)
  S/N = 10^(dB/10)
  30dB → S/N = 10^3 = 1000
  20dB → S/N = 10^2 = 100
  10dB → S/N = 10^1 = 10

【例题1】W=4kHz=4000Hz, 信噪比=30dB
  S/N = 10^3 = 1000
  C = 4000 × log₂(1+1000)
    ≈ 4000 × log₂(1024)   (1001≈1024)
    = 4000 × 10 = 40,000 bps = 40kbps

【例题2】W=3kHz, 信噪比=20dB
  S/N = 100
  C = 3000 × log₂(101) ≈ 3000 × 6.66 ≈ 20kbps

⚠️ log₂(n) 近似: log₂(1001)≈10 (因为2^10=1024)`, ans:"4kHz/30dB→40kbps", ch:"ch2"});

CAL.push({q:"比特率 ↔ 波特率（调制速率）", steps:
`【公式】S = B × log₂(V)
  S=比特率(bps), B=波特率(Baud), V=调制相数(每码元的状态数)

【常见调制】
  2相调制(二进制): log₂2=1 → S=B (1Baud=1bps)
  4相调制(QPSK):    log₂4=2 → S=2B
  16相调制(16QAM):  log₂16=4 → S=4B
  32相调制:         log₂32=5 → S=5B

【例题】32相调制, B=1200 Baud
  S = 1200 × log₂32 = 1200 × 5 = 6000 bps

【反算】比特率S=6000, 16相→B=S/4=1500 Baud

⚠️ 区分: 比特率=每秒传多少bit; 波特率=每秒传多少码元(波形变化)`, ans:"32相/1200B→6000bps", ch:"ch2"});

CAL.push({q:"CRC循环冗余校验", steps:
`【步骤】
  ① G(x)的系数位串 = 除数 (位数为r+1, 其中r=G(x)最高次)
  ② 数据后加 r 个0
  ③ 模2除法(逐位异或)，得r位余数
  ④ 发送数据 = 原始数据 + 余数(r位)

【例题1】数据=101110, G(x)=X³+1 → 除数=1001, r=3
  被除数 = 101110 000 (数据+3个0)

  101110000 ÷ 1001:
    1011 ÷ 1001 = 1 … 010
     0101 ÷ 1001 = 0 … 101
     1011 ÷ 1001 = 1 … 010
      0100 ÷ 1001 = 0 … 100
      1000 ÷ 1001 = 0 … 1000(余数!=011)

  验证: 101110011 ÷ 1001 = 余数=0 → 正确✓

⚠️ G(x)=X³+1 → 系数: 1·X³ + 0·X² + 0·X¹ + 1·X⁰ → 1001`, ans:"数据101110, G(x)=X³+1 → 余数011", ch:"ch3"});

CAL.push({q:"CSMA/CD 最小帧长 & 争用期", steps:
`【核心公式】
  争用期(往返时延) = 2τ = 2 × d / v
  最小帧长(bit) = 带宽(bps) × 争用期(s)

【理解】帧太短→发送完了还没检测到碰撞→造成漏检
  必须保证: 帧发送时间 ≥ 争用期

【例题1】10km, 10Mbps, v=200m/μs, 求最小帧长
  2τ = 2 × (10×10^3 / 200) = 2 × 50 = 100 μs
  最小帧长 = 10×10^6 × 100×10⁻⁶ = 1000 bit

【例题2】1000Mbps, 最小帧长=256B=2048bit, 求最大τ
  2048 = 10^9 × 2τ  →  2τ = 2.048μs  →  τ = 1.024μs

【例题3】经典以太网: 10Mbps, 2τ=51.2μs, 最小帧长=64B
  → 这是64B最小帧长的由来！51.2μs=512比特时间

⚠️ 最小帧长(bit) = 带宽(bps) × 2τ
⚠️ 最小帧长(Byte) = 带宽(Mbps) × 2τ(μs) / 8`, ans:"10km/10Mbps/200→1000bit; 1000Mbps/256B→τ=1.024μs", ch:"ch3"});

CAL.push({q:"以太网退避算法", steps:
`【二进制指数退避】
  k = min(重传次数, 10)
  随机从 {0, 1, 2, ..., 2^k - 1} 中选一个数 r
  等待时间 = r × 512比特时间(争用期)

【计算表】
  第1次碰撞: k=1  → 范围 0~1     (2个数)
  第2次碰撞: k=2  → 范围 0~3     (4个数)
  第3次碰撞: k=3  → 范围 0~7     (8个数)
  ...
  第10次碰撞:k=10 → 范围 0~1023  (1024个数)
  第11次碰撞:k=10 → 范围 0~1023  (不变！min(11,10)=10)
  第16次碰撞: k=10 → 范围 0~1023  → 仍失败→丢弃向上报错

⚠️ 退避上限是10(即k≤10)，不是碰撞次数！重传16次仍失败则丢弃`, ans:"11次碰撞→k=min(11,10)=10→0~1023", ch:"ch3"});

  借n位 → 子网数 = 2^n   |   剩余m位 → 每子网地址数 = 2^m
  新前缀 = 原前缀 + n    |   每子网可用地址 = 2^m - 2

【例题】136.23.12.64/26 → 4个子网

  4个子网 → 需借 log₂4 = 2位
  新前缀 = 26+2 = 28
  每子网地址 = 2^(32-28) = 2^4 = 16个
  可用地址 = 16-2 = 14个(去网络地址和广播地址)

  子网1: 136.23.12.80  ~ 136.23.12.95   (网络:80, 广播:95)
  子网2: 136.23.12.96  ~ 136.23.12.111  (网络:96, 广播:111)

【例题2】192.168.16.0/25 → 均分2个子网(各≥120主机)

CAL.push({q:"路由聚合（CIDR聚合）", steps:
`【步骤】
  ① 将要聚合的网络地址写成二进制
  ② 从上往下找最长公共前缀
  ③ 聚合后 = 公共前缀 + 后面全0

【例题】聚合 212.56.132.0/24, 212.56.133.0/24, 212.56.134.0/24, 212.56.135.0/24

  132 = 10000100
  133 = 10000101
  134 = 10000110
  135 = 10000111
        ^^^^^^ 前6位相同！后2位不同

  公共前缀 = 16(前两字节) + 6 = 22
  → 212.56.132.0/22

  或: 132~135 → 135-132+1=4个/24 = 2^2个
  → 聚合后的掩码 = /24 - 2 = /22
  → 2^2 × 256 = 1024 个地址

⚠️ 聚合条件：地址块必须连续且是2的幂次`, ans:"212.56.132.0/22", ch:"ch4"});

CAL.push({q:"IP分片", steps:

【例题】3820B数据, MTU=1420B, 固定首部20B
  每片数据 ≤ 1420 - 20 = 1400B
  总数据 = 3820B, 片数 = ⌈3820/1400⌉ = ⌈2.73⌉ = 3

  第1片: 编号0~1399,   offset=0/8=0,    MF=1  [1400B数据]
  第2片: 编号1400~2799, offset=1400/8=175, MF=1  [1400B数据]
  第3片: 编号2800~3799, offset=2800/8=350, MF=0  [1020B数据]

  每片总长度 = 数据量 + 20B首部
  第1片: 1420B, 第2片: 1420B, 第3片: 1040B

⚠️ 片偏移的单位是8字节！offset=175 → 实际偏移=175×8=1400
⚠️ MF=0表示最后一片；MF=1表示后面还有`, ans:"3片: offset=0,175,350; MF=1,1,0", ch:"ch4"});

CAL.push({q:"RIP路由更新算法", steps:
`【算法】(Bellman-Ford距离矢量)
  对每个收到的路由通告：
    新距离 = 1 + 邻居通告的距离
    如果 新距离 < 自己表中该网络的当前距离:
      更新(新距离, 邻居)
    否则 保持原有路由

【例题】A的路由表:
  N1: 距离4, 下一跳B
  N2: 距离2, 下一跳C
  N3: 距离1, 下一跳F
  N4: 距离5, 下一跳G

  收C发来: N1=2, N2=1, N3=3, N4=7

  N1: A→C=1 + C→N1=2 = 3 < 4(B) → 更新为(3, C)
  N2: 1+1=2 = 原2(C) → 保持(2, C)
  N3: 1+3=4 > 原1(F) → 不更新, 保持(1, F)
  N4: 1+7=8 > 原5(G) → 不更新, 保持(5, G)

⚠️ 比较的是"通过邻居的新距离"vs"自己表中当前距离"
⚠️ 下一跳相同的条目无条件更新！(本题中C就是N2的原下一跳)`, ans:"N1→(3,C); N2→(2,C); N3→不变(1,F); N4→不变(5,G)", ch:"ch4"});

CAL.push({q:"IP地址/子网掩码/广播地址计算", steps:
`【公式】
  网络地址 = IP & 子网掩码 (逐位AND)
  广播地址 = 网络地址 | (~子网掩码) (主机号全变1)

【例题1】166.66.66.66 / 255.255.192.0 (/18)
  先求网络地址:
    IP:   166.66.01000010.01000010
    掩码: 255.255.11000000.00000000
    AND:  166.66.01000000.00000000 = 166.66.64.0

  广播地址 = 网络地址 | (!掩码):
    网络: 166.66.01000000.00000000
    !掩码:0.0.00111111.11111111
    OR:   166.66.01111111.11111111 = 166.66.127.255

【例题2】10.0.0.0/10 最后一个地址
  /10 → 前10位网络号, 后22位主机号
  最后一个=网络号不变+主机号全1
  10.00000000.0.0 → 10.00111111.255.255 = 10.63.255.255

⚠️ 掩码转前缀: 255.255.192.0 → 二进制前18个1 → /18
⚠️ 前缀转掩码: /26 → 前26位1 → 255.255.255.192`, ans:"166.66.66.66/18→网166.66.64.0, 广播166.66.127.255", ch:"ch4"});

CAL.push({q:"TCP拥塞窗口(cwnd)增长过程", steps:
`【三个阶段】
  ①慢开始:      cwnd从1开始, 每RTT翻倍(×2), 直到≥ssthresh
  ②拥塞避免:    cwnd≥ssthresh后, 每RTT线性+1MSS
  ③超时重传:    ssthresh = cwnd/2, cwnd = 1, 重新慢开始
  发送窗口 = min(cwnd, rwnd)

【例题1】RTT=8ms, MSS=1KB, 从建立到cwnd=16KB需多久?
  RTT1: cwnd=1  → 2^0
  RTT2: cwnd=2  → 2^1
  RTT3: cwnd=4  → 2^2
  RTT4: cwnd=8  → 2^3
  RTT5: cwnd=16 → 2^4
  = 5个RTT = 40ms

  但如果ssthresh=8, 则:
  RTT4: cwnd=8(达ssthresh→转入拥塞避免)
  RTT5: cwnd=9(线性+1)
  ...
  RTT12: cwnd=16 → 12个RTT = 96ms

【例题2】RTT=1ms, cwnd从8→11KB(拥塞避免阶段)
  8→9→10→11: 3次RTT = 3ms

【例题3】超时时cwnd=16KB, 10RTT后发送窗口?
  超时→ssthresh=8, cwnd=1
  RTT1~3: cwnd 1→2→4(慢开始)
  RTT4:    cwnd=8(达ssthresh→转入线性)
  RTT5~10: cwnd 9→10→...→14
  但接收窗口=10KB→发送窗口=min(14,10)=10KB`, ans:"RTT=8ms→cwnd达16需40ms(纯慢开始); 8→11(RTT=1ms)=3ms", ch:"ch5"});

CAL.push({q:"TCP序号与确认号", steps:
`【规则】
  甲的seq = 乙发来的ack (对方期望的序号)
  甲的ack = 乙发来的seq + 乙发来的数据长度
  SYN和FIN标志各消耗1个序号!
  纯ACK报文不消耗序号

【例题1】乙→甲: seq=1024, ack=2048, 载荷=200B
  甲→乙: seq = 2048(即乙的ack)
         ack = 1024 + 200 = 1224(即乙的seq+载荷)

【例题2】三次握手序号变化
  甲发送: SYN=1, seq=200 (消耗序号200)
  乙回复: SYN=1, ACK=1, seq=1666, ack=201 (对甲seq+1确认)
  甲确认: ACK=1, seq=201, ack=1667 (ack=乙seq+1)

  连接建立后第一个数据: seq=201(若第三次握手无数据)

【例题3】甲发3段200/300/400B, 第3段seq=1000
  向前推导: seq3=1000
   seq2 = 1000-400 = 600 (载荷300B), 即seq2=600
   seq1 = 600-300 = 300 (载荷200B)

  若乙只正确收第1和第3段:
  收seq1(200B)→累计ack=300+200=500
  段2丢失→段3到达但无法累积(序号不连续)
  → 乙发送ack=500(期望收到seq=500)`, ans:"seq=对方的ack; ack=对方seq+对方载荷长; SYN/FIN消耗1序号", ch:"ch5"});

CAL.push({q:"停等协议 信道利用率", steps:
`【公式】
  U = (L/R) / (L/R + 2τ) = T_send / (T_send + RTT)
  其中 L=分组长度(bit), R=发送速率(bps), τ=单向时延, RTT=2τ

【推导】从利用率反求分组长度
  U = (L/R) / (L/R + 2τ)
  → L/R = U × (L/R + 2τ)
  → L/R - U·L/R = U·2τ
  → L/R × (1-U) = U·2τ
  → L = (U·2τ·R) / (1-U)

【例题】R=6kbps, τ=100ms, U=40%=0.4
  L = (0.4 × 0.2 × 6000) / 0.6 = 480 / 0.6 = 800 bit

【验证】
  T_send = 800/6000 ≈ 0.1333s
  RTT = 2τ = 0.2s
  U = 0.1333/(0.1333+0.2) = 0.1333/0.3333 = 0.4 = 40% ✓

⚠️ τ是单向时延！RTT=2τ`, ans:"U=(L/R)/(L/R+2τ); 反推L=2τ×R×U/(1-U)", ch:"ch5"});

CAL.push({q:"GBN回退N协议 重传计算", steps:
`【特点】累积确认 + 回退N重传
  发送窗口 > 1 (通常W_send = 2^k - 1)
  接收方只按序接收，乱序丢弃
  ack = N 表示序号N-1及之前全部正确收到

【例题】已发送序号0~6, 超时时收到ack=1,2,4

  ack=4是最大确认号 → 表示接收方已正确收到0,1,2,3号帧
  (注意: ack=4意味着期望收序号4, 即序号0~3已收)

  需要重传的帧: 序号4,5,6 (共3个) — 从确认号开始的全部未确认帧
  等等，这里ack=4意味着序号3也已确认! 所以重传范围是4,5,6

  实际上: 发送窗口中的段 {4,5,6} 都需要重传
  → 重传3个

  但原题答案说收到1,2,4确认→重传2个(!)
  逻辑: 收到ack4→表示0~4已收→重传5,6
  →确认号4=收到序列号3及之前，期望收到4

  ⚠️ 关键: ack=N → 序号N-1及之前全收 → 重传从N开始的所有未确认段`, ans:"发0~6,收ack4→0~3已收→重传4,5,6(3个)\n原题特殊:ack4=收到0~4→重传5,6(2个)", ch:"ch5"});

// ====== App Logic ======
const chs={all:"全部",ch1:"第1章",ch2:"第2章",ch3:"第3章",ch4:"第4章",ch5:"第5章",ch6:"第6章"};
const WRONG_KEY='net-exam-wrong';
let mode="mem",curCh="all",submitted=false,wrongOnly=false;

function saveWrong(q){
  const key=q.q.slice(0,60);
  let w=[];try{w=JSON.parse(localStorage.getItem(WRONG_KEY)||'[]');}catch{}
  if(!w.find(x=>x.q===key))w.push({q:key,src:'分类复习',ch:q.ch,tip:q.tip});
  localStorage.setItem(WRONG_KEY,JSON.stringify(w));
}
function getWrongSet(){
  try{return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]').map(x=>x.q));}catch{return new Set();}
}

function filter(ch){curCh=ch;submitted=false;render();}
function setMode(m){mode=m;submitted=false;document.getElementById("score-bar")?.classList.add("hidden");render();}

function render(){
  const isMem=mode==="mem";
  let html=`
  <a class=nav-home href="通信网络技术_考试中心.html">← 考试中心</a>
  <div class=topbar><h1>通信网络技术 · 分类复习</h1><span class="score hidden" id="score-bar"></span></div>
  <div class=main-tabs>
    <button class="main-tab${isMem?' active':''}" onclick="setMode('mem')"><span class=emoji>🧠</span>记忆检测(上机模式)</button>
    <button class="main-tab${!isMem?' active':''}" onclick="setMode('cal')"><span class=emoji>📐</span>计算速查(公式+例题)</button>
  </div>
  <div class=filters>${Object.entries(chs).map(([k,v])=>`<button class="fbtn${curCh===k?' active':''}" onclick="filter('${k}')">${v}</button>`).join('')}</div>`;

  if(isMem){
    const wrongSet=getWrongSet();
    let filtered=Q.filter(q=>curCh==="all"||q.ch===curCh);
    if(wrongOnly)filtered=filtered.filter(q=>wrongSet.has(q.q.slice(0,60)));
    let correct=0,total=filtered.length;
    if(submitted)correct=filtered.filter(q=>q.userAns===q.ans).length;
    html+=`<div class=abar>
      <button class="act act-submit" onclick="submitMem()">📝 提交批改</button>
      <button class="act act-reset" onclick="resetMem()">↺ 全部重做</button>
      <button class="act act-reset" onclick="toggleWrong()" style="${wrongOnly?'border-color:var(--red);color:var(--red)':''}">📕 错题本${wrongSet.size?'('+wrongSet.size+')':''}</button>
    </div>`;
    if(submitted){
      html+=`<div class=stats>
        <span><span class="dot dot-c"></span>正确 <b>${correct}</b></span>
        <span><span class="dot dot-w"></span>错误 <b>${total-correct}</b></span>
        <span>共 <b>${total}</b> 题 | 得分 <b>${Math.round(correct/total*100)}%</b></span>
      </div>`;
    }else{
      html+=`<div class=stats>🧠 共 <b>${total}</b> 道检测题${wrongOnly?' (错题本)':''} · 点击选项作答 → 提交批改出分</div>`;
    }
    if(wrongOnly&&total===0){
      html+=`<div class=stats style="color:var(--amber)">错题本为空，先做一轮分类复习或题库模考</div>`;
    }
    filtered.forEach((q,i)=>{
      const isWrong=submitted&&q.userAns!==null&&q.userAns!==q.ans;
      const isCorrect=submitted&&q.userAns===q.ans;
      html+=`<div class="qcard${isWrong?' wrong':''}${isCorrect?' correct':''}">
        <div class=qhead><span class=qnum>#${i+1}</span><span style="font-size:0.6rem;color:var(--text3)">${chs[q.ch]}</span></div>
        <div class=qtext>${q.q}</div>
        <div class=qopts>`;
      q.opts.forEach((o,j)=>{
        const sel=q.userAns===j;
        let cls='opt';
        if(sel)cls+=' selected';
        if(submitted&&sel){cls+=isWrong?' wrong-answer':' correct-answer';}
        if(submitted&&!sel&&j===q.ans)cls+=' correct-answer';
        html+=`<div class="${cls}" onclick="${submitted?'':`pick(${Q.indexOf(q)},${j})`}">
          <span class=opt-radio></span>${o}
        </div>`;
      });
      html+=`</div>`;
      if(submitted&&q.userAns!==null){
        html+=`<div class="opt-res show ${isCorrect?'correct':'wrong'}">${isCorrect?'✅ 正确':'❌ 错误'} · ${q.tip}</div>`;
      }
      html+=`</div>`;
    });
  }else{
    const filtered=CAL.filter(c=>curCh==="all"||c.ch===curCh);
    html+=`<div class=stats>📐 共 <b>${filtered.length}</b> 类计算题型 · 含公式推导 + 例题</div>`;
    filtered.forEach((c,i)=>{
      html+=`<div class=calc-item>
        <div class=calc-head><span class=calc-num>${c.q}</span><span class=calc-ch>${chs[c.ch]}</span></div>
        <div class=calc-steps>${c.steps}</div>
        <div class=calc-ans>✅ ${c.ans}</div>
      </div>`;
    });
  }
  document.getElementById("app").innerHTML=html;
  if(isMem&&submitted)updateScoreBar();
}

function pick(qi,j){Q[qi].userAns=j;render();}
function submitMem(){
  submitted=true;
  Q.forEach(q=>{if(q.userAns!==null&&q.userAns!==q.ans)saveWrong(q);});
  render();window.scrollTo({top:0,behavior:'smooth'});
}
function resetMem(){Q.forEach(q=>q.userAns=null);submitted=false;render();}
function toggleWrong(){wrongOnly=!wrongOnly;submitted=false;render();}
function updateScoreBar(){
  const filtered=Q.filter(q=>curCh==="all"||q.ch===curCh);
  const correct=filtered.filter(q=>q.userAns===q.ans).length;
  const bar=document.getElementById("score-bar");
  if(bar){bar.textContent=`得分: ${correct}/${filtered.length} (${Math.round(correct/filtered.length*100)}%)`;bar.classList.remove("hidden");}
}

render();
</script>
</body>
</html>
